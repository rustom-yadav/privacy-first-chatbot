version: '3.8'

services:
  api:
    build: 
      context: ./api
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DATABASE_URL=${DATABASE_URL}  # Agar MongoDB connect karna ho
    depends_on:
      - ollama
    volumes:
      - ./api:/app  # Live code reloading ke liye
      - chromadb_data:/app/chroma_db # Vector DB ka data persist karne ke liye

  client:
    build: 
      context: ./client
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    volumes:
      - ./client:/app # Live UI reloading ke liye
      - /app/node_modules # Container ke node_modules ko override hone se bachane ke liye

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama  # Downloaded models ko save rakhne ke liye

volumes:
  ollama_models:
  chromadb_data: